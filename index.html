<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loom People — Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1C1917;
      --accent: #C2610C;
      --cream: #F7F3EE;
      --warm-white: #FDFAF7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-white);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px;
    }
    .logo {
      display: inline-flex;
      align-items: baseline;
      font-family: 'Fraunces', Georgia, serif;
    }
    .logo .loom {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--ink);
      font-style: italic;
    }
    .logo .people {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--accent);
      margin-left: 4px;
    }
    .logo .dot {
      width: 4px;
      height: 4px;
      border-radius: 9999px;
      background: var(--accent);
      margin-left: 3px;
      margin-bottom: 4px;
      align-self: flex-end;
      display: inline-block;
    }

    /* Light variant on dark surface */
    .logo.light .loom { color: rgba(255,255,255,0.9); }

    /* Larger display version */
    .logo.xl .loom, .logo.xl .people { font-size: 56px; }
    .logo.xl .dot { width: 9px; height: 9px; margin-left: 7px; margin-bottom: 10px; }

    .card {
      padding: 64px 80px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card.cream { background: var(--cream); }
    .card.dark { background: var(--ink); }
    .label {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(28,25,23,0.5);
      margin-bottom: 16px;
      text-align: center;
    }
    .group { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <div class="group">
    <div class="label">Primary — Cream Background</div>
    <div class="card cream">
      <div class="logo xl">
        <span class="loom">Loom</span><span class="people">People</span><span class="dot"></span>
      </div>
    </div>
  </div>

  <div class="group">
    <div class="label">Inverse — Dark Background</div>
    <div class="card dark">
      <div class="logo xl light">
        <span class="loom">Loom</span><span class="people">People</span><span class="dot"></span>
      </div>
    </div>
  </div>

  <div class="group">
    <div class="label">Compact — Navbar Size</div>
    <div class="logo">
      <span class="loom">Loom</span><span class="people">People</span><span class="dot"></span>
    </div>
  </div>
</body>
</html>
